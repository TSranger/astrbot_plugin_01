    #   cooldown_seconds: 43200

    #   messages:
    #     - "我就是熬夜冠军！"
    #     # - "一会儿吃啥？"

    # # 示例 3：给单独群的固定提醒
    # - task_id: "lunch_question"
    #   enabled: true
    #   time: "10:30"
