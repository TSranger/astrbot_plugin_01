# =========================
# AstrBot Plugin 01 配置说明
# =========================
# 这份配置只作用于 astrbot_plugin_01 插件。
# 所有新增注释均为说明用途，不影响 YAML 解析。
#
# 设计目标：
# 1. 被 @ 或被点名时能立即回应，而不是依赖 buffer_threshold。
# 2. 群友连续聊到它时，也能像真人一样适度插一句。
# 3. “说话 / 分析 / 总结 / 合并记忆”可以走不同模型。
#
# 常见布尔值：
# - true  = 开启
# - false = 关闭
#
# 常见 scope / mode 可选值：
# - llm_settings.mode:
#   - "astrbot_default" = 全部继续使用 AstrBot 当前默认 provider
#   - "plugin_router"   = 本插件内部按角色分别调用不同 OpenAI-compatible 模型
# - special_replies.rules[].trigger_mode:
#   - "any"              = 只要规则命中就可触发
#   - "direct_wake_only" = 只有被 @ / 被点名 / 被点名问话时才触发
# - special_replies.rules[].scope:
#   - "whitelist_only" = 仅对白名单群生效
#   - "all_groups"     = 对插件实际生效的所有群都可触发

############################
# 当前设计缺陷：
# 1）内心想法（括号里的内容，比如“看看不说话”之类的）就不需要发出来了
############################

plugin_settings:
  # 是否启用整个插件。
  # 可选值：true / false
  enabled: true

group_scope:
  # 是否启用群聊范围限制。
  # true  = 只在 group_whitelist 中列出的群运行
  # false = 所有群都运行（排查回复问题时建议先关闭）
  enabled: true

  # 允许生效的群号白名单。
  # 当 enabled=false 时，这里仅作为记录，不参与拦截。
  group_whitelist: ['966648392', '157903619']

skill_settings:
  # 当前使用的人设 / 技能文件路径。
  # 可填：
  # - 插件目录下的相对路径
  # - 绝对路径
  # 这个文件通常决定机器人的角色口吻、背景设定、世界观。
  active_skill_file: "skills/漫游时空.skill/SKILL.md"

  # 机器人在群里可能被人提到的名字列表。
  # 只要消息里出现其中任意一个名字，就会被视作“被点名”。
  # 建议填：
  # - 常用昵称
  # - 正式名字
  # - 容易被群友叫的简称
  bot_names:
    # - "小号"
    # - "漫舞时空"
    - "漫游时空"
    # - "派蒙"

  # “直接唤醒问句”的正则表达式列表。
  # 用于识别：虽然没 @，但明显是在问机器人。
  # 每个元素都是 Python 正则表达式。
  # 常见写法：
  # - 带 (?i) 表示忽略大小写
  # - 可自行加入更多口语问法
  direct_wake_question_patterns:
    - "(?i).*(派蒙|漫游时空).*(吗|呢|怎么|为什么|咋|啥|什么|会不会|是不是).*"
    - "(?i).*(问|问下|想问).*(派蒙|漫游时空).*"

message_reaction_settings:
  # 被 @ / 被点名 / 被直接问话时，取最近多少条消息作为即时回复上下文。
  # 数值越大，上下文越完整；越小，回复越直接。
  # 推荐范围：6~15
  immediate_context_messages: 10

  # 即时回复时，额外参考最近多少条 paragraph summary（段落摘要）。
  # 这些摘要来自长期记忆压缩结果。
  # 推荐范围：2~5
  immediate_summary_count: 5

  # 即时回复冷却时间（秒）。
  # 排查时设为 0，确保每次直接触发都能立即进入回复流程。
  immediate_cooldown_seconds: 0

  # 主动插话冷却时间（秒）。
  # 排查时设为 0，避免后台主动回复被冷却拦掉。
  proactive_cooldown_seconds: 0

  # 是否启用“短窗口反应”。
  # 含义：最近若干条消息里频繁提到机器人，就算没人直接 @，也可以顺势说一句。
  # 可选值：true / false
  short_window_enabled: true

  # 短窗口统计的消息条数。
  # 例如设为 8，表示检查最近 8 条消息里是否反复提到机器人。
  # 推荐范围：5~10
  short_window_size: 5

  # 最近 short_window_size 条消息中，至少出现多少次“名字命中”才触发短窗口接话。
  # 设高一点会更稳，减少“太爱刷存在感”。
  # 推荐范围：2~4
  short_window_name_hit_min_count: 2

  # 最近 short_window_size 条消息中，至少出现多少次真正 @ 才触发短窗口接话。
  # 通常 1 就够，因为有人 @ 本身已是强信号。
  # 推荐范围：1~2
  short_window_mention_hit_min_count: 1

  # 最近 short_window_size 条消息中，至少多少次“被点名问话”才触发。
  # 推荐范围：1~3
  short_window_question_hit_min_count: 1

  # 短窗口接话冷却时间（秒）。
  # 排查时设为 0，避免短窗口逻辑被冷却拦掉。
  short_window_cooldown_seconds: 5

memory_settings:
  # 长期记忆分析触发阈值。
  # 当缓存消息数达到这个值时，会触发一次“分析 / 总结 / 记忆更新 / 潜在插话点提炼”。
  # 注意：它现在不再控制“被 @ 后是否立即说话”。
  # 推荐范围：8~20
  buffer_threshold: 10

  # 每次长窗口处理后，保留多少条重叠消息进入下一轮。
  # 作用：避免上下文割裂。
  # 推荐范围：2~5
  overlap_count: 3

  # 每个用户最多保留多少条动态事件记忆。
  # 超过后会触发旧事件压缩合并。
  # 推荐范围：6~20
  max_dynamic_events: 10

  # 合并旧动态事件时，目标短句长度（字数）。
  # 值越小，长期记忆越简洁；值越大，保留细节越多。
  # 推荐范围：12~30
  dynamic_event_merge_target_length: 18

  # 主动插话时，会取最近多少条消息作为上下文。
  # 推荐范围：8~16
  recent_context_messages_for_interject: 10

  # 记忆数据库路径。
  # 可填：
  # - 相对路径：会自动落到 AstrBot 的 plugin_data 目录下
  # - 绝对路径：直接使用指定路径
  memory_db_path: "astrbot_plugin_01/agentic_memory.db"

probability_settings:
  # 普通情况下主动插话的基础概率。
  # 只影响“长窗口分析后，机器人想不想主动接一句”。
  # 越低越像低存在感群友。
  # 推荐范围：0.03~0.15
  base_interject_probability: 0.6

  # 当当前话题和角色偏好更匹配时，主动插话概率提升到多少。
  # 推荐范围：0.15~0.40
  boost_interject_probability: 0.9

summary_settings:
  # 所有记忆归纳任务统一在每天这个时间点检查和执行。
  # 格式必须是 "HH:MM"。
  rollup_time: "04:00"

  # paragraph -> daily：每批处理多少条 paragraph summary。
  # 推荐范围：5~20
  daily_chunk_size: 10

  # paragraph -> daily：每个中间摘要的最大字数。
  # 推荐范围：60~150
  daily_chunk_summary_max_chars: 100

  # paragraph -> daily：最终 daily summary 的最大字数。
  # 推荐范围：100~250
  daily_summary_max_chars: 150

  # daily -> month：每个中间摘要的最大字数。
  # 推荐范围：80~180
  month_chunk_summary_max_chars: 120

  # daily -> month：最终 month summary 的最大字数。
  # 推荐范围：120~260
  month_summary_max_chars: 180

  # daily -> month：最多喂给模型多少字符。
  # 推荐范围：800~6000
  month_input_char_limit: 3500

  # month -> year：每个中间摘要的最大字数。
  # 推荐范围：100~220
  year_chunk_summary_max_chars: 140

  # month -> year：最终 year summary 的最大字数。
  # 推荐范围：150~320
  year_summary_max_chars: 220

  # month -> year：最多喂给模型多少字符。
  # 推荐范围：1000~8000
  year_input_char_limit: 4000

  # year -> history：最终 history summary 的最大字数。
  # 推荐范围：180~400
  history_summary_max_chars: 320

  # year -> history：最多喂给模型多少字符。
  # 推荐范围：1000~6000
  history_input_char_limit: 3000

  # 被 daily 归纳后的 paragraph，再额外保留多少天再删除。
  # 例如设为 1：今天凌晨 4 点刚归纳进 daily 的 paragraph，
  # 会在明天凌晨 4 点之后进入清理范围。
  paragraph_cleanup_delay_days: 1

  # 被 month 归纳后的 daily，再额外保留多少个月再删除。
  # 例如设为 1：本月 1 号凌晨 4 点刚归纳进 month 的上个月 daily，
  # 会在下个月 1 号凌晨 4 点之后进入清理范围。
  daily_cleanup_delay_months: 1

  # 被 year 归纳后的 month，再额外保留多少年再删除。
  # 例如设为 1：今年 1 月 1 日凌晨 4 点刚归纳进 year 的去年月记忆，
  # 会在明年 1 月 1 日凌晨 4 点之后进入清理范围。
  month_cleanup_delay_years: 1

  # year 层最多保留最近多少个完整年份。
  # 超过这个年限的 year，会进一步被归纳到 history。
  year_retention_years: 3

  # 被 history 归纳后的 year，再额外保留多少年再删除。
  year_cleanup_delay_years: 1

memory_lookup_settings:
  # 是否启用“时间 / 事件回忆检索”。
  enabled: true

  # 是否启用“按时间去回忆”。
  # 例如：刚才 / 今天 / 昨天 / 上个月 / 去年 / 去年 3 月。
  time_recall_enabled: true

  # 是否启用“按事件去反推记忆”。
  # 例如：烤肉 / 聚餐 / 请客 / 午饭。
  event_recall_enabled: true

  # 只把“最近多少条 paragraph summary”作为普通背景带入回复。
  recent_paragraph_limit: 5

  # 单次记忆召回时，每种记忆层最多带入多少条。
  daily_limit: 3
  month_limit: 2
  year_limit: 2
  history_limit: 2
  paragraph_limit: 3

  # 从事件反推时间后，再联想附近多少条同期记忆。
  neighbor_limit: 3

  # “同期联想”时，允许跨多少天寻找附近记忆。
  # 数值越大，越容易联想到同一阶段发生的其他事。
  neighbor_window_days: 45

  # 从用户问题里最多抽取多少个事件关键词用于弱匹配。
  keyword_limit: 4

  # 单条召回记忆在 prompt 中最多展示多少字，避免太长。
  excerpt_max_chars: 120

prompt_settings:
  # 在分析模型提示词里，最多截取多少人设文本用于辅助理解角色。
  # 数值太大会增加 token 消耗。
  # 推荐范围：300~1500
  analysis_skill_excerpt_chars: 800

  # 通用回复风格说明。
  # 会作为所有聊天回复的基础风格要求。
  # 建议写成“你希望它像什么样的人说话”。
  chat_reply_style: "像群里熟人，不要客服腔，不要自我介绍；优先一句短回复，必要时两句；少用感叹号，不要每次都接满。"

  # 每次回复最多几句。
  # 推荐值：
  # - 1 = 极简、像高冷群友
  # - 2 = 比较自然，推荐
  # - 3 = 偶尔展开
  chat_reply_max_sentences: 2

  # 当记忆不足时，允许模型参考的“自然遗忘型”说法。
  # 不建议太正式。
  fallback_memory_reply: "忘了。"

  # 被 @ / 被点名时的专用风格补充。
  # 建议：直接回答，不绕弯，不讲大道理。
  immediate_reply_style: "如果别人是在直接问你，就先正面回答，再决定要不要顺手补半句。"

  # 群友连续聊到它时的专用风格补充。
  # 建议：像路过接一句，不要像突然开演讲。
  short_window_reply_style: "如果只是大家连续提到你，就像路过被 cue 到一样接一句，轻一点、自然一点。"

  # 主动插话时的专用风格补充。
  # 建议：少发言、少抢戏、少总结别人。
  proactive_reply_style: "主动接话时要克制，像潜水群友偶尔冒泡，不要强行总结全场。"

  # 尽量避免的表达习惯。
  # 这是纯提示词约束，不是硬规则。
  avoid_phrases:
    - "作为"
    - "根据你的描述"
    - "我认为"
    - "总的来说"
    - "哈哈哈哈"
    - "你好"
    - "您好"

reply_dedup:
  # 是否启用回复去重。
  # 作用：避免近几次回复过于雷同。
  enabled: false

  # 去重窗口大小：记住最近多少条自己的回复用于比较。
  # 推荐范围：5~15
  window_size: 8

  # 是否只对主动插话启用去重。
  # true  = 只约束 proactive
  # false = 即时回复、短窗口回复等也会参与去重
  only_proactive: true

  # 命中重复时，是否允许模型重试一次，换种说法。
  retry_once_on_duplicate: true

special_replies:
  # 是否启用“固定短回复规则”。
  # 排查即时回复问题时先关闭，避免它抢先命中掩盖真实触发链路。
  enabled: false

  rules:
    # 规则示例 1：别人问“怎么还不睡”
    - rule_id: "late_sleep"
      # 是否启用该条规则。
      enabled: true

      # 优先级，越大越先匹配。
      priority: 100

      # 触发模式：
      # - "any"
      # - "direct_wake_only"
      trigger_mode: "direct_wake_only"

      # 正则匹配列表，只要任意一条命中即可。
      patterns:
        - "(怎么|为什么).*(还不睡|还没睡)"
        - "(还不睡|还没睡).*(怎么|为什么)"

      # 候选回复列表，命中后随机选择其一。
      candidate_replies:
        - "失眠了。"
        - "睡不着。"
        # - "还没困。"

      # 是否必须满足对应条件才允许触发。
      required_mention: false
      required_name_hit: false
      required_question_mark: false

      # 该条规则的独立冷却时间（秒）。
      cooldown_seconds: 180

      # 适用范围：
      # - "whitelist_only"
      # - "all_groups"
      scope: "whitelist_only"

    # 规则示例 2：别人问“周边买不买”
    - rule_id: "merch_buy"
      enabled: true
      priority: 90
      trigger_mode: "direct_wake_only"
      patterns:
        - "(买不买|要不要买|值得买吗).*(周边|谷子|立牌|吧唧|手办|娃)"
        - "(周边|谷子|立牌|吧唧|手办|娃).*(买不买|要不要买|值得买吗)"
      candidate_replies:
        - "买。"
        - "这还用问，买。"
        - "想买就别忍。"
      required_mention: false
      required_name_hit: false
      required_question_mark: false
      cooldown_seconds: 180
      scope: "whitelist_only"

proactive_talk_settings:
  # 是否启用“定时主动说话”。
  # 开启后，插件会按下面的 tasks 独立执行。
  enabled: true

  # 所有定时主动发言共用的总冷却时间（秒）。
  # 例如设为 3600，表示某个群刚触发过一个定时任务后，
  # 其他定时任务也要至少等 1 小时才能再次发送。
  cooldown_seconds: 0

  # 发送失败后的重试间隔（秒）。
  # 仅用于“可重试失败”（例如临时网络波动）；像“不在群里/已被移出群”
  # 这类明确失败会在当天停止重试，避免每 30 秒刷报错。
  failure_retry_seconds: 1800

  # 默认投递群列表。
  # 如果某个 task 没单独写 group_ids，就使用这里的群号。
  # 若 group_scope.enabled=true，这里填写的群也必须在 group_whitelist 中。
  default_group_ids:
    - "966648392"
    - "157903619"

  # 可配置多个独立任务。
  # 每个任务每天最多执行一次。
  tasks:
    # # 示例 1：固定时间
    # - task_id: "night_champion"
    #   enabled: true

    #   # 固定触发时间，格式必须是 "HH:MM"
    #   time: "05:00"

    #   # 该任务自己的额外冷却时间（秒）。
    #   # 只限制同一个 task_id 在同一群里的再次发送。
    #   cooldown_seconds: 0

    #   # 可选：只让这条任务发到指定群。
    #   # 不写则使用 default_group_ids。
    #   # group_ids:
    #   #   - "966648392"

    #   # 候选说话内容，可写一个或多个，命中时随机选一条。
    #   messages:
    #     - "我就是熬夜冠军！"

    # 示例 2：随机时间范围
    - task_id: "lunch_question"
      enabled: true

      # 随机范围模式：
      # 当不写 time，而是写 time_range_start / time_range_end 时，
      # 插件会在这个范围内为“当天”随机抽一个固定时刻执行。
      time_range_start: "10:30"
      time_range_end: "12:00"

      cooldown_seconds: 43200

      messages:
        - "中午吃啥？"
        # - "一会儿吃啥？"

    - task_id: "night_champion"
      enabled: true

      # 随机范围模式：
      time_range_start: "05:00"
      time_range_end: "05:50"

      cooldown_seconds: 43200

      messages:
        - "我就是熬夜冠军！"
        # - "一会儿吃啥？"

    # 示例 3：给单独群的固定提醒
    # - task_id: "afternoon_tea"
    #   enabled: true
    #   time: "15:30"
    #   cooldown_seconds: 0
    #   group_ids:
    #     - "966648392"
    #   messages:
    #     - "下午要不要整点喝的？"

logging_settings:
  # 是否把插件关键日志额外写入插件自己的日志文件。
  # true  = 平台日志 + 插件文件日志双写
  # false = 仅输出到平台日志
  # file_logging_enabled: true
  file_logging_enabled: false

  # 插件私有日志文件路径。
  # 相对路径会自动写入 AstrBot 的 plugin_data 目录。
  log_file_path: "astrbot_plugin_01/agentic_memory_plugin.log"

  # 是否记录群消息事件的原始结构调试日志。
  # 排查 @ 识别失败时建议临时开启。
  raw_event_debug_enabled: false

  # 原始结构日志里是否包含消息链各 segment 详情。
  raw_event_message_chain_enabled: true

  # 单条原始调试日志最多保留多少字符，防止刷爆日志文件。
  raw_event_max_chars: 4000

llm_settings:
  # LLM 路由模式：
  # - "astrbot_default" = 所有角色都走 AstrBot 当前默认 provider
  # - "plugin_router"   = 本插件内部按角色分别走不同 OpenAI-compatible 模型
  mode: "plugin_router"

  # 当 plugin_router 调用失败时，是否自动回退到 AstrBot 默认 provider。
  # 排查时建议开启，避免路由配置问题让“明明触发了却没回”。
  fallback_to_astrbot_default: true

  roles:
    # 角色：chat
    # 用途：真正发到群里的说话内容。
    chat:
      # 只有在 llm_settings.mode="plugin_router" 时，这个 enabled 才有意义。
      enabled: true

      # 当前仅支持 "openai_compatible"
      provider_type: "openai_compatible"

      # 接口基础地址。
      # 可填：
      # - "https://xxx/v1"
      # - "https://xxx/v1/chat/completions"
      # 插件会自动兼容补全。
      base_url: "https://api.deepseek.com"

      # API Key。留空表示不带 Authorization Bearer。
      api_key: "sk-985dfc13a842478ca2dc1ea63171a96e"

      # 模型名，例如：
      # - "gpt-4o-mini"
      # - "deepseek-chat"
      # - "qwen-plus"
      model: "deepseek-v4-flash"    # 或“deepseek-v4-pro”

      # 温度。越高越活泼、越容易发散。
      # chat 推荐范围：0.7~1.0
      temperature: 0.85

      # top_p 采样参数。
      # 一般 0.8~1.0 即可。
      top_p: 0.9

      # 最大输出 token。
      max_tokens: 192

      # 请求超时秒数。
      timeout_seconds: 60

      # 额外请求头，通常留空即可。
      # 例如：
      # extra_headers:
      #   X-Api-Version: "2024-01"
      extra_headers: {}

    # 角色：analysis
    # 用途：分析聊天内容、输出结构化 JSON、提取记忆更新与可插话点。
    analysis:
      enabled: true
      provider_type: "openai_compatible"
      base_url: "https://api.deepseek.com"
      api_key: "sk-985dfc13a842478ca2dc1ea63171a96e"
      model: "deepseek-v4-flash"    # 或“deepseek-v4-pro”

      # analysis 需要稳定、克制、结构化，温度建议较低。
      temperature: 0.2
      top_p: 0.9
      max_tokens: 768
      timeout_seconds: 90
      extra_headers: {}

    # 角色：compression
    # 用途：压缩段落摘要 / 日总结 / 历史总结。
    compression:
      enabled: true
      provider_type: "openai_compatible"
      base_url: "https://api.deepseek.com"
      api_key: "sk-985dfc13a842478ca2dc1ea63171a96e"
      model: "deepseek-v4-flash"    # 或“deepseek-v4-pro”
      temperature: 0.2
      top_p: 0.9
      max_tokens: 512
      timeout_seconds: 90
      extra_headers: {}

    # 角色：event_merge
    # 用途：把旧动态事件压缩成一句短记忆。
    event_merge:
      enabled: true
      provider_type: "openai_compatible"
      base_url: "https://api.deepseek.com"
      api_key: "sk-985dfc13a842478ca2dc1ea63171a96e"
      model: "deepseek-v4-flash"    # 或“deepseek-v4-pro”
      temperature: 0.2
      top_p: 0.9
      max_tokens: 128
      timeout_seconds: 60
      extra_headers: {}
